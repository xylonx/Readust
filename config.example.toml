[application]
# Address and port the service binds to.
#
# Use "0.0.0.0" to listen on all network interfaces.
# Use "127.0.0.1" to listen only on localhost.
#
# Default:
# addr = "0.0.0.0:8000"

# HTTP server request timeout, in seconds.
#
# Requests that take longer than this value may be terminated.
# Increase this if the service handles long-running requests.
#
# Default:
# timeout = 120

# Directory where application logs are stored.
#
# If this directory does not exist, the application will create it automatically.
# The service process must have permission to create this directory and write
# log files inside it.
#
# Default:
# log_dir = "./logs/"

# Maximum number of rotated log files to keep.
#
# When the number of rotated log files exceeds this value, the oldest
# log files are removed.
#
# Set this based on how many days of logs you want to retain.
#
# Default:
# log_max_files = 14

# Base log file name inside `log_dir`.
#
# The application uses daily log rotation. The final rotated log filename is built as:
#   {log_dir}/{log_file}.{YYYY-MM-DD}
#
# Default:
# log_file = "app.log"

# Disable user signup.
#
# Set to true to prevent new users from registering.
# Existing users can still log in.
#
# Recommended for private deployments:
# disable_signup = true
#
# Default:
# disable_signup = false

# JWT secret used to sign authentication tokens.
#
# IMPORTANT:
# Replace this value before running in production.
# Never commit your real JWT secret to version control.
#
# You can generate a secure secret with:
#
#   openssl rand -hex 32
#
# Example:
# jwt_secret = "4f8d7c..."
jwt_secret = "YOU_MUST_REPLACE_IT_TO_YOUR_ACTUAL_SECRET"

# JWT token expiration time, in seconds.
#
# The default value below is 3600 seconds, or 1 hour.
#
# After this time, users will need to refresh or obtain a new token.
#
# Default:
# jwt_token_expires_in = 3600

# Magic anonymous token used by Readest.
#
# Readest uses this token as an API key and Authorization Bearer header
# when refreshing access tokens.
anon_token = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZic3l4ZnVzampxZHhranFseXNjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MzQxMjM2NzEsImV4cCI6MjA0OTY5OTY3MX0.3U5Uqaou_1SgrVe1eo9rApc0uKjqhpQdUXhvwUHmUfg"


[database]
# PostgreSQL database connection URI.
#
# Replace the placeholders with your actual database credentials.
#
# Format:
#
#   postgres://${user}:${password}@${host}:${port}/${database}
#
# Example:
#
#   postgres://readest:secret-password@localhost:5432/readest
#
# Placeholder meanings:
#
#   ${user}      PostgreSQL username
#   ${password}  PostgreSQL password
#   ${host}      PostgreSQL host, for example localhost or db
#   ${port}      PostgreSQL port, usually 5432
#   ${database}  PostgreSQL database name
#
# IMPORTANT:
# Do not commit production database credentials to version control.
uri = "postgres://${user}:${password}@${host}:${port}/${database}"


[s3]
# S3-compatible storage endpoint.
#
# Leave empty when using AWS S3 with the default regional endpoint.
# Set this for S3-compatible providers such as MinIO, Cloudflare R2,
# Backblaze B2, or other object storage services.
#
# Examples:
#
#   endpoint = "https://s3.amazonaws.com"
#   endpoint = "https://<account-id>.r2.cloudflarestorage.com"
#   endpoint = "http://localhost:9000"
endpoint = ""

# Access key ID for the S3-compatible storage account.
#
# Keep this value secret in production.
access_key_id = ""

# Secret access key for the S3-compatible storage account.
#
# Keep this value secret in production.
# Do not commit production credentials to version control.
secret_access_key = ""

# Storage region.
#
# For AWS S3, use the bucket region, for example:
#
#   region = "us-east-1"
#
# For some S3-compatible providers, this may be a fixed value
# or may be ignored by the provider.
region = ""

# Bucket name used to store uploaded objects.
#
# The bucket must already exist unless your application creates it elsewhere.
bucket = ""

# Expiration time for presigned upload URLs, in seconds.
#
# The default is 1800 seconds, or 30 minutes.
# Uncomment and change this value if clients need more or less time
# to upload files.
#
# Default:
# presign_upload_expires_in = 1800

# Expiration time for presigned download URLs, in seconds.
#
# The default is 1800 seconds, or 30 minutes.
# Uncomment and change this value if clients need more or less time
# to download files.
#
# Default:
# presign_download_expires_in = 1800


# Optional Prometheus metrics configuration.
#
# If this section is omitted, the Prometheus server will be disabled.
#
[metrics]
# Enable or disable the Prometheus metrics server.
#
# Set to true to expose application metrics for Prometheus scraping.
enabled = false

# Address and port the Prometheus metrics server binds to.
#
# Use "0.0.0.0" to listen on all network interfaces.
# Use "127.0.0.1" to expose metrics only on localhost.
addr = "0.0.0.0:8080"

# Metrics upkeep interval, in seconds.
#
# The application refreshes or maintains internal metrics state
# at this interval.
upkeep_duration = 10
